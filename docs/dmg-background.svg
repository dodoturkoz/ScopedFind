<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <marker id="arrowhead" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 2 2 L 16 9 L 2 16 z" fill="#2f6fed"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="640" height="360" fill="#f7f8fb"/>
  <rect x="28" y="26" width="584" height="308" rx="24" fill="#ffffff" stroke="#e5e7eb"/>

  <text x="320" y="88" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="700" fill="#111827">
    Drag ScopedFind to Applications
  </text>

  <path d="M 245 184 C 286 147, 354 147, 395 184"
        fill="none" stroke="#2f6fed" stroke-width="12" stroke-linecap="round"
        marker-end="url(#arrowhead)" filter="url(#shadow)"/>

  <text x="320" y="150" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif"
        font-size="15" font-weight="600" fill="#4b5563">
    copy, then open from /Applications
  </text>
</svg>
