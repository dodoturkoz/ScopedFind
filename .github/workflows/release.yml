name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app
        run: |
          xcodebuild \
            -project ScopedFind.xcodeproj \
            -scheme ScopedFind \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            build

      - name: Create DMG
        run: |
          bash scripts/create-release-dmg.sh \
            "build/Build/Products/Release/ScopedFind.app" \
            "${GITHUB_REF_NAME}" \
            "ScopedFind-${GITHUB_REF_NAME}.dmg"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "ScopedFind-${GITHUB_REF_NAME}.dmg" \
            --title "ScopedFind ${GITHUB_REF_NAME}" \
            --notes 'Dependency-free unsigned macOS DMG build. ScopedFind uses built-in macOS tools, Unicode-aware fallback matching, and in-process PDF/DOCX text extraction, with no bundled search binaries, package-manager dependencies, telemetry, updater, or cloud service. Drag ScopedFind.app onto the Applications shortcut in the DMG window, then run `xattr -dr com.apple.quarantine /Applications/ScopedFind.app` in Terminal before opening it from Applications. Building from source remains available in the README.'
