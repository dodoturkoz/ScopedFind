name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app
        run: |
          xcodebuild \
            -project ScopedFind.xcodeproj \
            -scheme ScopedFind \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            build

      - name: Create DMG
        run: |
          bash scripts/create-release-dmg.sh \
            "build/Build/Products/Release/ScopedFind.app" \
            "${GITHUB_REF_NAME}" \
            "ScopedFind-${GITHUB_REF_NAME}.dmg"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "ScopedFind-${GITHUB_REF_NAME}.dmg" \
            --title "ScopedFind ${GITHUB_REF_NAME}" \
            --notes 'Dependency-free unsigned macOS DMG build. ScopedFind 0.7 adds in-process content search for modern Excel (`.xlsx`/`.xlsm`) and PowerPoint (`.pptx`/`.pptm`) files, including workbook cells, stored formulas and values, comments, slide text, speaker notes, and presentation comments. The Learn/Exact guide shows the real `find` and `grep` argument arrays plus app-side Unicode, PDFKit, and bounded Office ZIP/XML stages. ScopedFind bundles no search binaries or package-manager dependencies and includes no telemetry, updater, or cloud service. Legacy `.xls` and `.ppt` files remain unsupported. Drag ScopedFind.app onto the Applications shortcut in the DMG window, then run `xattr -dr com.apple.quarantine /Applications/ScopedFind.app` in Terminal before opening it from Applications. Building from source remains available in the README.'
